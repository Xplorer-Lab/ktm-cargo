# ============================================================================
# Dependabot Configuration
# Automatically creates PRs for dependency updates
# ============================================================================

version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Bangkok'
    open-pull-requests-limit: 10
    reviewers:
      - 'FreddieKT'
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore(deps)'
    groups:
      # Group minor and patch updates together
      minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      # Keep major updates separate for review
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      testing:
        patterns:
          - 'jest'
          - '@testing-library/*'
          - 'vitest'
      build:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'eslint*'
          - 'prettier'
          - 'typescript'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
