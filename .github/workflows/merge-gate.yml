name: Merge Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  merge-gate:
    name: Merge Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get all statuses for this PR's latest commit
            const commitRef = context.payload.pull_request.head.sha;

            const { data: statuses } = await github.rest.repos.listCommitStatusesForRef({
              owner, repo, ref: commitRef
            });

            const checks = await github.rest.checks.listForRef({
              owner, repo, ref: commitRef
            });

            const allChecks = [
              ...statuses.map(s => ({ name: s.context, state: s.state })),
              ...checks.data.check_runs.map(c => ({ name: c.name, state: c.conclusion || c.status }))
            ];

            const ciChecks = allChecks.filter(c => 
              c.name.startsWith('CI/') || 
              ['Lint & Format', 'Unit Tests', 'Build', 'Lint & Format', 'E2E Smoke'].includes(c.name)
            );

            console.log('CI checks found:', JSON.stringify(ciChecks, null, 2));

            const failed = ciChecks.filter(c => 
              c.state === 'failure' || c.state === 'action_required'
            );

            const pending = ciChecks.filter(c => 
              c.state === 'pending' || c.state === 'in_progress' || c.state === 'queued'
            );

            const success = ciChecks.filter(c => c.state === 'success');

            console.log(`Passed: ${success.length}, Failed: ${failed.length}, Pending: ${pending.length}`);

            if (failed.length > 0) {
              core.setFailed(`Failed checks: ${failed.map(c => c.name).join(', ')}`);
            }

            if (pending.length > 0) {
              core.warning(`Pending checks: ${pending.map(c => c.name).join(', ')}`);
            }
