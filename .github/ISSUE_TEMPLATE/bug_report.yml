name: Bug Report
description: Something is broken
labels: ['type:bug']
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Pick the closest match — you will apply the matching label (P0/P1/P2) after submitting
      options:
        - 'P0 — Customer financial data wrong / data corrupt / security hole'
        - 'P1 — App crash / wrong data in internal views'
        - 'P2 — Minor UX / cosmetic issue'
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - invoices
        - shipments
        - shopping-orders
        - procurement
        - auth
        - ci
        - other
    validations:
      required: true

  - type: checkboxes
    id: regression
    attributes:
      label: Regression?
      options:
        - label: This was working before the last merge

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See error"
